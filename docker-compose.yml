services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: random_episode
      POSTGRES_PASSWORD: random_episode
      POSTGRES_DB: random_episode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U random_episode"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://random_episode:random_episode@db:5432/random_episode?sslmode=disable
      TMDB_API_KEY: ${TMDB_API_KEY}
      PORT: "8080"
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
